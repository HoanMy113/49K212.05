<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>FixItNow</title>

    <!-- Bootstrap & Font -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">

    <!-- CSS frontend -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- ================= NAVBAR ================= -->

    <nav class="navbar-custom">
        <div class="container nav-wrapper">
            <div class="logo">FixItNow</div>

            <div class="nav-actions">

                <!-- Chưa đăng nhập -->
                <div class="nav-guest">
                    <button class="btn-register">Đăng ký</button>
                    <button id="loginBtn" class="btn-login">Đăng nhập</button>
                    
                </div>

                <!-- Đã đăng nhập -->
                <div class="nav-user">

                    <!-- Notification icon -->
                    <div class="nav-icon">
                        <img src="assets/images/bell.png" alt="Thông báo">
                    </div>

                    <!-- User dropdown -->
                    <div class="user-dropdown">

                        <img id="userAvatar" 
                            src="assets/images/user.png" 
                            class="user-avatar" />

                        <div class="dropdown-menu">
                            <a href="#">
                                <img src="assets/images/list.png" width="18">
                                Quản lý yêu cầu
                            </a>

                            <a href="page/profile.html">
                                <img src="assets/images/avatar.png" width="18">
                                Quản lý hồ sơ
                            </a>

                            <a href="#" id="logoutBtn">
                                <img src="assets/images/logout.png" width="18">
                                Đăng xuất
                            </a>
                        </div>

                    </div>

                </div>

            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="container text-center">

            <h1 class="hero-title">
                <span class="static-text">Sửa chữa nhà cửa,</span>
                <span class="text-slider">
                    <span class="slider-track">
                        <span class="slide">thật dễ dàng.</span>
                        <span class="slide">nhanh chóng.</span>
                        <span class="slide">tiện lợi.</span>
                        <span class="slide">thật dễ dàng.</span>
                        <span class="slide">nhanh chóng.</span>
                        <span class="slide">tiện lợi.</span>
                    </span>
                </span>
            </h1>

            <div class="search-bar-wrapper">
                <div class="search-bar">

                    <div class="search-section" id="categoryToggle">
                        <img src="assets/images/menu.png" class="search-icon">
                        <span id="categoryText">Danh mục sửa chữa</span>
                        <img src="assets/images/arrow-down.png" class="arrow-icon" id="categoryArrow">
                    </div>

                    <div class="divider"></div>

                    <div class="search-section location-shift" id="locationToggle">
                        <img src="assets/images/location.png" class="search-icon">
                        <span id="locationText">Địa điểm</span>
                        <img src="assets/images/arrow-down.png" class="arrow-icon" id="locationArrow">
                    </div>

                    <button class="search-main-btn">Tìm thợ</button>
                </div>

                <div class="category-dropdown">

                    <div class="category-header">
                        <div class="search-input full">
                            <input type="text" id="categorySearch" placeholder="Nhập danh mục cần sửa chữa">
                        </div>
                    </div>

                    <div class="category-body">

                        <label class="category-item">
                            <input type="checkbox">
                            Sửa điện
                        </label>

                        <label class="category-item">
                            <input type="checkbox">
                            Sửa ống nước
                        </label>

                        <label class="category-item">
                            <input type="checkbox">
                            Sửa máy lạnh
                        </label>

                        <label class="category-item">
                            <input type="checkbox">
                            Sửa máy giặt
                        </label>

                        <label class="category-item">
                            <input type="checkbox">
                            Sửa tủ lạnh
                        </label>

                        <label class="category-item">
                            <input type="checkbox">
                            Sửa bếp gas
                        </label>

                        <label class="category-item">
                            <input type="checkbox">
                            Lắp bóng đèn
                        </label>

                        <label class="category-item">
                            <input type="checkbox">
                            Lắp quạt trần
                        </label>

                        <label class="category-item">
                            <input type="checkbox">
                            Thông tắc cống
                        </label>

                        <label class="category-item">
                            <input type="checkbox">
                            Sửa khóa cửa
                        </label>

                        <label class="category-item">
                            <input type="checkbox">
                            Khoan treo kệ
                        </label>

                        <label class="category-item">
                            <input type="checkbox">
                            Sơn sửa nhỏ
                        </label>

                        <label class="category-item">
                            <input type="checkbox">
                            Lắp rèm cửa
                        </label>

                        <label class="category-item">
                            <input type="checkbox">
                            Sửa nóng lạnh
                        </label>

                        <label class="category-item">
                            <input type="checkbox">
                            Sửa máy bơm
                        </label>

                        <label class="category-item">
                            <input type="checkbox">
                            Lắp camera
                        </label>
                    </div>

                    <div class="category-footer">
                        <span class="clear-category">Bỏ tất cả</span>
                        <button class="apply-category">Áp dụng</button>
                    </div>

                </div>

                <!-- LOCATION PANEL -->
                <div class="dropdown-panel location-popup" id="locationPanel">

                    <!-- HEADER SEARCH -->
                    <div class="location-header">
                        <div class="search-input">
                            <input type="text" placeholder="Nhập Tỉnh/Thành phố">
                        </div>
                        <div class="search-input">
                            <input type="text" placeholder="Nhập Phường/Xã/Quận/Huyện">
                        </div>
                    </div>

                    <div class="location-body">
                        <div class="province-column" id="provinceColumn"></div>
                        <div class="district-column" id="districtColumn"></div>
                    </div>

                    <div class="location-footer">
                        <span class="clear-all" id="clearAll">Bỏ chọn tất cả</span>
                        <button class="apply-btn" id="saveLocation">Áp dụng</button>
                    </div>

                </div>
            </div>
        </div>
    </section>

    <script src="js/main.js"></script>
</body>
</html>
