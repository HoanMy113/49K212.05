<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đánh giá dịch vụ | FixItNow</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: #f4f7f6; font-family: 'Nunito', sans-serif; margin: 0; padding-top: 90px; min-height: 100vh; }

        .review-container { max-width: 560px; margin: 0 auto; padding: 0 20px 40px; }

        .back-link {
            display: inline-flex; align-items: center; gap: 8px;
            color: #4e7d63; font-weight: 700; font-size: 14px; text-decoration: none;
            margin-bottom: 24px; transition: all 0.2s;
        }
        .back-link:hover { color: #3a6b52; transform: translateX(-3px); }

        .review-card {
            background: white; border-radius: 16px; padding: 40px 36px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .review-card h3 {
            text-align: center; font-size: 22px; font-weight: 800; color: #1a1a2e; margin: 0 0 6px;
        }
        .review-card .subtitle {
            text-align: center; color: #999; font-size: 14px; font-weight: 600; margin-bottom: 28px;
        }

        /* Star Rating */
        .rating-section { text-align: center; margin-bottom: 28px; }
        .rating-label {
            font-size: 13px; font-weight: 700; color: #aaa; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 12px;
        }
        .star-rating {
            display: flex; justify-content: center; gap: 8px;
        }
        .star-rating .star {
            font-size: 36px; color: #e0e0e0; cursor: pointer;
            transition: color 0.15s, transform 0.15s; user-select: none;
        }
        .star-rating .star:hover { transform: scale(1.15); }
        .star-rating .star.active { color: #f5a623; }
        .rating-text {
            margin-top: 8px; font-size: 14px; font-weight: 700; color: #f5a623;
            min-height: 20px;
        }

        /* Form */
        .form-section { margin-bottom: 24px; }
        .form-section label {
            font-size: 13px; font-weight: 700; color: #555;
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: block;
        }
        .form-section textarea {
            width: 100%; border: 1.5px solid #e8e8e8; border-radius: 12px;
            padding: 14px 16px; font-size: 15px; font-family: 'Nunito', sans-serif;
            color: #333; resize: vertical; min-height: 100px; transition: border-color 0.2s;
        }
        .form-section textarea:focus {
            outline: none; border-color: #4e7d63; box-shadow: 0 0 0 3px rgba(78,125,99,0.08);
        }
        .form-section textarea::placeholder { color: #ccc; }

        .btn-submit {
            width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 16px;
            font-weight: 700; color: white; cursor: pointer; transition: all 0.2s;
            background: linear-gradient(135deg, #4e7d63, #3a9d6e);
            box-shadow: 0 4px 15px rgba(78,125,99,0.3);
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(78,125,99,0.4); }
        .btn-submit:active { transform: translateY(0); }

        .divider { height: 1px; background: #f0f0f0; margin: 24px 0; }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar-custom">
    <div class="container nav-wrapper">
        <a href="index.html" class="logo" style="text-decoration:none;">FixItNow</a>
        <div class="nav-actions">
            <a href="notifications.html" class="nav-icon" style="text-decoration:none; position:relative;">
                <img src="assets/images/bell.png" alt="Thông báo" style="width:24px; height:24px;">
            </a>
            <div class="user-dropdown">
                <div class="user-btn" id="userAvatar" style="cursor:pointer;">
                    <img src="assets/images/user.png" class="user-avatar" style="width:30px; height:30px; border-radius:50%; object-fit:cover;">
                    <span id="username">Người dùng</span>
                </div>
                <div class="dropdown-menu">
                    <a href="customer-profile.html"><i class="fa-solid fa-gear"></i> Tài khoản</a>
                    <a href="my-requests.html"><i class="fa-solid fa-clipboard-list"></i> Yêu cầu của tôi</a>
                    <a href="#" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Đăng xuất</a>
                </div>
            </div>
        </div>
    </div>
</nav>

<!-- MAIN -->
<main class="review-container">
    <a href="my-requests.html" class="back-link"><i class="fas fa-arrow-left"></i> Quay lại yêu cầu</a>

    <div class="review-card">
        <h3>Đánh giá dịch vụ</h3>
        <p class="subtitle">Chia sẻ trải nghiệm của bạn để giúp cải thiện chất lượng</p>

        <form id="reviewForm">
            <!-- Star Rating -->
            <div class="rating-section">
                <div class="rating-label">Chất lượng dịch vụ</div>
                <div class="star-rating" id="starRating">
                    <span class="star" data-rating="1">★</span>
                    <span class="star" data-rating="2">★</span>
                    <span class="star" data-rating="3">★</span>
                    <span class="star" data-rating="4">★</span>
                    <span class="star" data-rating="5">★</span>
                </div>
                <div class="rating-text" id="ratingText"></div>
            </div>

            <div class="divider"></div>

            <!-- Comment -->
            <div class="form-section">
                <label>Bình luận</label>
                <textarea id="comment" placeholder="Ví dụ: Thợ nhiệt tình, sửa chữa nhanh chóng..." required></textarea>
            </div>

            <button type="submit" class="btn-submit">Gửi đánh giá</button>
        </form>
    </div>
</main>

<script src="js/config.js"></script>
<script src="js/main.js"></script>
<script src="js/review.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const usernameEl = document.getElementById("username");
        if (usernameEl) usernameEl.textContent = sessionStorage.getItem("fullName") || sessionStorage.getItem("userName") || "Người dùng";

        const userAvatar = document.getElementById("userAvatar");
        const dropdownMenu = document.querySelector(".dropdown-menu");
        if (userAvatar && dropdownMenu) {
            let isOpen = false;
            userAvatar.addEventListener("click", (e) => { e.stopPropagation(); isOpen = !isOpen; dropdownMenu.classList.toggle("show", isOpen); });
            document.addEventListener("click", (e) => { if (isOpen && !dropdownMenu.contains(e.target)) { dropdownMenu.classList.remove("show"); isOpen = false; } });
        }

        document.getElementById("logoutBtn")?.addEventListener("click", (e) => { e.preventDefault(); sessionStorage.clear(); window.location.href = "login.html"; });
    });
</script>
</body>
</html>
