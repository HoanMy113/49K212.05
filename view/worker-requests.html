<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yêu cầu đã nhận | FixItNow</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .request-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        .request-header h2 {
            margin: 0;
            font-size: 28px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .request-header p {
            color: #666;
            margin: 5px 0 0 0;
        }
        .request-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            min-height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .empty-icon {
            font-size: 64px;
            color: #e0e0e0;
            margin-bottom: 20px;
        }
        .empty-text {
            color: #888;
            font-size: 16px;
        }
        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #4e7d63;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 20px;
            transition: all 0.2s;
        }
        .back-btn:hover {
            transform: translateX(-5px);
        }
    </style>
</head>
<body>
    <div class="navbar-placeholder"></div>

    <main class="container py-4">
        <a href="index.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Quay lại
        </a>

        <div class="request-content">
            <div class="request-header">
                <h2><i class="fas fa-hard-hat" style="color: #4e7d63;"></i> Yêu cầu đã nhận</h2>
            </div>
            <p style="color: #666; margin-top: -20px; margin-bottom: 30px;">Danh sách các yêu cầu sửa chữa gửi đến bạn.</p>

            <div id="requestsList" class="request-card">
                <div class="empty-icon">
                    <i class="fas fa-box-open"></i>
                </div>
                <div class="empty-text">Chưa có yêu cầu nào gửi đến bạn.</div>
            </div>
            
            <!-- PAGINATION -->
            <nav aria-label="Page navigation" id="paginationNav" class="mt-4" style="display: none;">
                <ul class="pagination justify-content-center" id="paginationList">
                </ul>
            </nav>
        </div>
    </main>

    <footer class="footer mt-5">
        <div class="container text-center">
            <p>&copy; 2026 FixItNow - Website kết nối sửa chữa dân dụng tức thời</p>
        </div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/main.js"></script>
    <script src="js/worker-requests.js"></script>
    <script>
        // Check session and navbar state
        window.addEventListener('load', () => {
            const navbarPlaceholder = document.querySelector('.navbar-placeholder');
            if (navbarPlaceholder) {
                // Initialize navbar from main.js logic if needed
            }
        });
    </script>
    </body>
</html>
