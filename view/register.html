<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký | FixItNow</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f8faf9;
            height: auto;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
        }
        .auth-wrapper {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }
        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-header h1 {
            color: #4e7d63;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .role-tabs {
            display: flex;
            background: #f0f1f4;
            padding: 5px;
            border-radius: 10px;
            margin-bottom: 25px;
        }
        .role-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            transition: all 0.2s;
        }
        .role-tab.active {
            background: white;
            color: #4e7d63;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }
        .form-control {
            width: 100%;
            padding: 11px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
        }
        .form-control:focus {
            border-color: #4e7d63;
            outline: none;
        }
        .auth-btn {
            width: 100%;
            background: #4e7d63;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
        }
        .auth-links {
            text-align: center;
            margin-top: 25px;
            color: #666;
            font-size: 14px;
        }
        .auth-links a {
            color: #4e7d63;
            text-decoration: none;
            font-weight: 600;
        }
        .invalid-feedback {
            color: #d9534f;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }
        .form-control.is-invalid {
            border-color: #d9534f;
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h1>FixItNow</h1>
                <p>Đăng ký tài khoản mới</p>
            </div>

            <div class="role-tabs" id="roleTabs">
                <div class="role-tab active" data-role="Customer">Khách hàng</div>
                <div class="role-tab" data-role="Repairman">Thợ sửa chữa</div>
            </div>

            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label">Họ và tên</label>
                    <input type="text" id="fullName" class="form-control" placeholder="Nhập họ và tên đầy đủ" required>
                    <div class="invalid-feedback" id="nameError">Tên không hợp lệ.</div>
                </div>
                <div class="form-group">
                    <label class="form-label">Số điện thoại</label>
                    <input type="text" id="phone" class="form-control" placeholder="Nhập số điện thoại" required>
                    <div class="invalid-feedback" id="phoneError">Số điện thoại không hợp lệ.</div>
                </div>
                <div class="form-group">
                    <label class="form-label">Mật khẩu</label>
                    <input type="password" id="password" class="form-control" placeholder="Tối thiểu 6 ký tự" required>
                    <div class="invalid-feedback" id="passwordError">Mật khẩu quá ngắn.</div>
                </div>
                <!-- Extra fields for repairman -->
                <div id="repairmanFields" style="display: none;">
                    <div class="form-group">
                        <label class="form-label">Kỹ năng chính</label>
                        <select id="category" class="form-control">
                            <option value="Sửa điện">Sửa điện</option>
                            <option value="Sửa nước">Sửa nước</option>
                            <option value="Máy lạnh">Máy lạnh</option>
                            <option value="Điện gia dụng">Điện gia dụng</option>
                        </select>
                    </div>
                </div>
                
                <button type="submit" class="auth-btn">Tạo tài khoản</button>
            </form>

            <div class="auth-links">
                Đã có tài khoản? <a href="login.html">Đăng nhập</a>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
