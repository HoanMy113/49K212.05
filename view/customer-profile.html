<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ của tôi | FixItNow</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: #eaf3ed;
            font-family: 'Nunito', sans-serif;
            margin: 0;
            padding-top: 90px;
            min-height: 100vh;
        }
        .profile-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px 40px;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #4e7d63;
            font-weight: 700;
            font-size: 15px;
            text-decoration: none;
            margin-bottom: 20px;
            transition: all 0.2s;
        }
        .back-btn:hover {
            color: #3a6b52;
            transform: translateX(-3px);
        }

        .profile-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
            overflow: hidden;
        }
        .profile-header {
            background: linear-gradient(135deg, #4e7d63 0%, #3a9d6e 100%);
            color: white;
            padding: 35px 40px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .profile-header i {
            font-size: 48px;
            opacity: 0.9;
        }
        .profile-header h3 {
            margin: 0;
            font-weight: 800;
            font-size: 24px;
        }
        .profile-header p {
            margin: 5px 0 0;
            opacity: 0.85;
            font-size: 15px;
        }
        .profile-body {
            padding: 40px;
        }

        /* Removed Custom Tabs CSS to prevent overriding Bootstrap */
        .section-title {
            font-size: 18px;
            font-weight: 800;
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        .form-label {
            font-weight: 700;
            color: #495057;
            margin-bottom: 8px;
        }
        .form-control {
            border-radius: 12px;
            padding: 12px 18px;
            border: 2px solid #e8e8e8;
            font-size: 15px;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #4e7d63;
            box-shadow: 0 0 0 4px rgba(78,125,99,0.1);
        }
        .form-control:read-only {
            background-color: #f5f5f5;
            cursor: not-allowed;
            opacity: 0.8;
        }
        .btn-save {
            background: linear-gradient(135deg, #4e7d63, #3a9d6e);
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 15px;
            transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(78,125,99,0.3);
        }
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(78,125,99,0.4);
            color: white;
        }
        .input-icon-group {
            position: relative;
        }
        .input-icon-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
        }
        .input-icon-group .form-control {
            padding-left: 45px;
        }

        .footer {
            text-align: center;
            padding: 30px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>

<nav class="navbar-custom bg-white border-bottom shadow-sm">
    <div class="container nav-wrapper d-flex justify-content-between align-items-center">
        <!-- Khối Logo (Trái) -->
        <a href="index.html" class="logo d-flex align-items-center gap-2 text-dark text-decoration-none">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-success"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
            <span class="fs-4 fw-bold">FixItNow</span>
        </a>

        <!-- Khối Avatar + Thông báo (Phải) -->
        <div class="nav-actions d-flex align-items-center gap-3">
            <a href="notifications.html" class="nav-icon d-flex align-items-center justify-content-center p-0 m-0 text-decoration-none">
                <img src="assets/images/bell.png" alt="Thông báo" style="width:24px; height:24px; object-fit: contain;">
            </a>
            
            <div class="user-dropdown position-relative">
                <div class="user-btn d-flex align-items-center gap-2" id="userAvatar" style="cursor:pointer;">
                    <img src="assets/images/user.png" class="user-avatar shadow-sm border" style="width:34px; height:34px; border-radius:50%; object-fit:cover;">
                    <span class="fw-semibold text-dark fs-6" id="username">Người dùng</span>
                </div>
                <div class="dropdown-menu">
                    <a href="#" id="navManageRequests">
                        <img src="assets/images/list.png" width="18">
                        Quản lý yêu cầu
                    </a>
                    <a href="#" id="navProfileLink">
                        <img src="assets/images/avatar.png" width="18">
                        Quản lý hồ sơ
                    </a>
                    <a href="#" id="logoutBtn">
                        <img src="assets/images/logout.png" width="18">
                        Đăng xuất
                    </a>
                </div>
            </div>
        </div>
    </div>
</nav>

<!-- MAIN CONTENT -->
<div class="container py-5">
    <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
            <h2 class="fw-bold mb-1" style="color: #1a1a2e; font-size: 28px;">Quản lý hồ sơ</h2>
            <p class="text-muted mb-0">Cập nhật thông tin và bảo mật tài khoản của bạn.</p>
        </div>
        <a href="index.html" class="btn btn-outline-secondary rounded-pill" style="font-weight:600;"><i class="fas fa-arrow-left me-2"></i> Quay lại</a>
    </div>

    <div class="row g-4">
        <!-- Left Column: Avatar & Upload -->
        <div class="col-lg-4">
            <div class="card border-0 shadow-sm rounded-4 h-100">
                <div class="card-body text-center p-5">
                    <div class="position-relative d-inline-block mb-4">
                        <img src="assets/images/user.png" class="rounded-circle border border-4 border-white shadow-sm" style="width: 140px; height: 140px; object-fit: cover;" alt="User Avatar" id="profileImagePreview">
                    </div>
                    <h5 class="fw-bold mb-1" id="displayFullName">Người dùng</h5>
                    <p class="text-muted small mb-4" id="displayRole">Khách hàng</p>
                    
                    <button type="button" class="btn btn-light w-100 rounded-3 fw-semibold border" style="color: #555;" id="btnBrowseAvatar">
                        <i class="fa-solid fa-camera me-2"></i> Đổi ảnh đại diện
                    </button>
                    <input type="file" id="avatarInput" hidden accept="image/*">
                    <p class="text-muted mt-3" style="font-size: 13px;">Định dạng: JPG, PNG. Bố cục vuông.</p>
                </div>
            </div>
        </div>

        <!-- Right Column: Styled Form & Tabs -->
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm rounded-4 h-100">
                <div class="card-body p-5">

                    <!-- TABS -->
                    <ul class="nav nav-pills mb-4" id="profileTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active rounded-pill px-4 fw-semibold" data-bs-toggle="pill" data-bs-target="#tab-info" type="button" role="tab" style="color:#555;"><i class="fa-solid fa-id-card me-2"></i> Thông tin</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link rounded-pill px-4 fw-semibold" data-bs-toggle="pill" data-bs-target="#tab-security" type="button" role="tab" style="color:#555;"><i class="fa-solid fa-shield-halved me-2"></i> Bảo mật</button>
                        </li>
                    </ul>

                    <div class="tab-content" id="profileTabsContent">
                        <!-- TAB 1: Personal Info -->
                        <div class="tab-pane fade show active" id="tab-info" role="tabpanel">
                            <form id="profileForm">
                                <div class="row g-3">
                                    <div class="col-md-12 mb-3">
                                        <label for="fullName" class="form-label fw-bold text-secondary">Họ và tên</label>
                                        <input type="text" class="form-control form-control-lg bg-light" id="fullName" placeholder="Nhập họ và tên" required style="font-size: 15px;">
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="phoneNumber" class="form-label fw-bold text-secondary">Số điện thoại</label>
                                        <input type="text" class="form-control form-control-lg bg-light text-muted" id="phoneNumber" readonly style="font-size: 15px; cursor: not-allowed;">
                                        <small class="text-muted d-block mt-1">Lấy từ tài khoản đăng nhập.</small>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="email" class="form-label fw-bold text-secondary">Email</label>
                                        <input type="email" class="form-control form-control-lg bg-light" id="email" placeholder="Nhập địa chỉ email" style="font-size: 15px;">
                                    </div>
                                </div>
                                <div class="text-end mt-4 pt-3 border-top">
                                    <button type="submit" class="btn btn-primary px-5 py-2 fw-bold" id="btnUpdateProfile" style="background-color: #4e7d63; border-color: #4e7d63; border-radius: 8px;">
                                        Lưu thay đổi
                                    </button>
                                </div>
                            </form>
                        </div>

                        <!-- TAB 2: Change Password -->
                        <div class="tab-pane fade" id="tab-security" role="tabpanel">
                            <form id="passwordForm">
                                <div class="mb-4">
                                    <label for="currentPassword" class="form-label fw-bold text-secondary">Mật khẩu hiện tại</label>
                                    <input type="password" class="form-control form-control-lg bg-light" id="currentPassword" placeholder="Nhập mật khẩu hiện tại" required style="font-size: 15px;">
                                </div>
                                <div class="mb-4">
                                    <label for="newPassword" class="form-label fw-bold text-secondary">Mật khẩu mới</label>
                                    <input type="password" class="form-control form-control-lg bg-light" id="newPassword" placeholder="Tối thiểu 6 ký tự" required style="font-size: 15px;">
                                </div>
                                <div class="mb-4">
                                    <label for="confirmPassword" class="form-label fw-bold text-secondary">Xác nhận mật khẩu mới</label>
                                    <input type="password" class="form-control form-control-lg bg-light" id="confirmPassword" placeholder="Nhập lại mật khẩu mới" required style="font-size: 15px;">
                                </div>
                                <div class="text-end mt-4 pt-3 border-top">
                                    <button type="submit" class="btn btn-primary px-5 py-2 fw-bold" id="btnUpdatePassword" style="background-color: #4e7d63; border-color: #4e7d63; border-radius: 8px;">
                                        Cập nhật mật khẩu
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                    
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="footer">
    © 2026 FixItNow - Website kết nối sửa chữa dân dụng tức thời
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/customer-profile.js"></script>
<script>
    // Navbar + Tab logic
    document.addEventListener('DOMContentLoaded', () => {
        const usernameEl = document.getElementById("username");
        if (usernameEl) usernameEl.textContent = sessionStorage.getItem("fullName") || "Người dùng";

        const userAvatar = document.getElementById("userAvatar");
        const dropdownMenu = document.querySelector(".dropdown-menu");
        if (userAvatar && dropdownMenu) {
            let isOpen = false;
            userAvatar.addEventListener("click", (e) => { e.stopPropagation(); isOpen = !isOpen; dropdownMenu.classList.toggle("show", isOpen); });
            document.addEventListener("click", (e) => { if (isOpen && !dropdownMenu.contains(e.target)) { dropdownMenu.classList.remove("show"); isOpen = false; } });
        }

        const logoutBtn = document.getElementById("logoutBtn");
        if (logoutBtn) logoutBtn.addEventListener("click", (e) => { e.preventDefault(); sessionStorage.clear(); window.location.href = "login.html"; });
    });
</script>
</body>
</html>
