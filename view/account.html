<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tài khoản & Cài đặt | FixItNow</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="navbar-placeholder"></div>

    <main class="container py-4">
        <h2 class="mb-4">Tài khoản & Cài đặt</h2>

        <div class="row">
            <div class="col-md-4">
                <div class="card p-3 mb-4 shadow-sm border-0">
                    <div class="text-center py-3">
                        <div class="rounded-circle bg-light d-inline-block p-3 mb-3">
                            <i class="fas fa-user fa-3x text-success"></i>
                        </div>
                        <h4 id="accountName">---</h4>
                        <p class="text-muted" id="accountPhone">---</p>
                    </div>
                    <hr>
                    <div class="list-group list-group-flush">
                        <a href="profile.html" class="list-group-item list-group-item-action border-0 px-0">
                            <i class="fas fa-id-card me-2"></i> Hồ sơ thợ
                        </a>
                        <a href="my-requests.html" class="list-group-item list-group-item-action border-0 px-0">
                            <i class="fas fa-history me-2"></i> Lịch sử yêu cầu
                        </a>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card p-4 shadow-sm border-0">
                    <h5 class="mb-4">Thông tin cá nhân</h5>
                    <form id="accountForm">
                        <div class="mb-3">
                            <label class="form-label">Họ và tên</label>
                            <input type="text" id="fullName" class="form-control" placeholder="Nhập họ và tên">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Số điện thoại</label>
                            <input type="text" id="phone" class="form-control" readonly style="background-color: #f8f9fa;">
                        </div>
                        <button type="submit" class="btn btn-success px-4">Lưu thay đổi</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script src="js/account.js"></script>
</body>
</html>
