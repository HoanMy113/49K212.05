<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Thợ | FixItNow</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Nunito', sans-serif; }
        
        /* Dashboard Layout */
        .dashboard-wrapper { display: flex; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar {
            width: 250px;
            background: #fff;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }
        .sidebar .brand {
            font-size: 24px;
            font-weight: 800;
            color: #4e7d63;
            text-align: center;
            margin-bottom: 40px;
            text-decoration: none;
        }
        .sidebar-menu { list-style: none; padding: 0; margin: 0; flex-grow: 1; }
        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 20px;
            color: #666;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }
        .sidebar-link:hover, .sidebar-link.active {
            background: #eaf3ed;
            color: #4e7d63;
        }
        .sidebar-link i { font-size: 18px; width: 20px; text-align: center; }
        .logout-btn { color: #dc3545; margin-top: auto; }
        .logout-btn:hover { background: #fdf7f7; color: #dc3545; }

        /* Main Content */
        .main-content {
            flex-grow: 1;
            margin-left: 250px;
            padding: 30px 40px;
        }
        
        /* Topbar */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .welcome-text h2 { margin: 0; font-size: 24px; font-weight: 800; color: #333; }
        .welcome-text p { margin: 0; color: #888; font-size: 14px; }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: #fff;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.2s;
        }
        .stat-card[data-filter] {
            cursor: pointer;
        }
        .stat-card[data-filter]:hover {
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            transform: translateY(-2px);
        }
        .stat-card.active {
            outline: 2.5px solid #4e7d63;
            outline-offset: -2px;
            box-shadow: 0 6px 20px rgba(78,125,99,0.15);
        }
        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .stat-icon.pending { background: #fff8e1; color: #ffa000; }
        .stat-icon.completed { background: #eaf3ed; color: #4e7d63; }
        .stat-icon.rating { background: #fdf2f8; color: #ec4899; }
        .stat-icon.cancelled { background: #fce4ec; color: #c62828; }
        
        .stat-info h3 { margin: 0; font-size: 28px; font-weight: 800; color: #333; }
        .stat-info p { margin: 0; color: #888; font-size: 14px; font-weight: 600; }

        /* Requests Section */
        .section-title { font-size: 20px; font-weight: 800; color: #333; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .requests-container {
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            min-height: 400px;
        }
        
        /* Request Card Style */
        .request-item {
            border: 1px solid #eee;
            border-radius: 12px;
            transition: all 0.2s;
        }
        .request-item:hover {
            border-color: #4e7d63;
            box-shadow: 0 5px 15px rgba(78,125,99,0.08);
        }
        .badge { font-weight: 700; padding: 6px 12px; border-radius: 20px; }
    </style>
</head>
<body>

    <div class="dashboard-wrapper">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <a href="index.html" class="brand">FixItNow <span style="color:#f39c12; font-size:16px;">PRO</span></a>
            
            <ul class="sidebar-menu">
                <li><a href="#" class="sidebar-link active"><i class="fa-solid fa-chart-pie"></i> Tổng quan</a></li>
                <li><a href="profile.html" class="sidebar-link"><i class="fa-solid fa-user-gear"></i> Tài khoản</a></li>
                <li><a href="worker-notifications.html" class="sidebar-link"><i class="fa-solid fa-bell"></i> Thông báo <span id="sidebarBadge" style="display:none; background:#e74c3c; color:white; font-size:11px; padding:2px 7px; border-radius:10px; margin-left:auto; font-weight:700;"></span></a></li>
                <li><a href="worker-feedback.html" class="sidebar-link"><i class="fa-solid fa-star"></i> Đánh giá</a></li>
            </ul>

            <a href="#" id="logoutBtn" class="sidebar-link logout-btn"><i class="fa-solid fa-arrow-right-from-bracket"></i> Đăng xuất</a>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <!-- TOPBAR -->
            <div class="topbar">
                <div class="welcome-text">
                    <h2 id="welcomeName">Xin chào, Thợ!</h2>
                    <p>Chào mừng trở lại bảng điều khiển</p>
                </div>
            </div>

            <!-- STATS -->
            <div class="stats-grid">
                <div class="stat-card" data-filter="pending">
                    <div class="stat-icon pending"><i class="fa-solid fa-clock"></i></div>
                    <div class="stat-info">
                        <h3 id="statPending">0</h3>
                        <p>Yêu cầu chờ / nhận</p>
                    </div>
                </div>
                <div class="stat-card" data-filter="completed">
                    <div class="stat-icon completed"><i class="fa-solid fa-circle-check"></i></div>
                    <div class="stat-info">
                        <h3 id="statCompleted">0</h3>
                        <p>Đã hoàn thành</p>
                    </div>
                </div>
                <div class="stat-card" data-filter="cancelled">
                    <div class="stat-icon cancelled"><i class="fa-solid fa-ban"></i></div>
                    <div class="stat-info">
                        <h3 id="statCancelled">0</h3>
                        <p>Đã huỷ</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon rating"><i class="fa-solid fa-star"></i></div>
                    <div class="stat-info">
                        <h3 id="statRating">0.0</h3>
                        <p>Điểm đánh giá trung bình</p>
                    </div>
                </div>
            </div>

            <!-- REQUESTS LIST -->
            <h3 class="section-title"><i class="fa-solid fa-list-check" style="color:#4e7d63;"></i> Danh sách yêu cầu <span id="filterLabel" style="font-size:14px; font-weight:600; color:#4e7d63;"></span></h3>
            <div class="requests-container" id="requestsList">
                <div class="text-center py-5">
                    <i class="fas fa-spinner fa-spin fa-2x text-muted mb-3"></i>
                    <p class="text-muted">Đang tải danh sách yêu cầu...</p>
                </div>
            </div>
        </main>
    </div>

    <script src="js/config.js"></script>
    <script src="js/main.js"></script>
    <script src="js/worker-requests.js"></script> <!-- Reuse rendering logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const name = sessionStorage.getItem('userName') || 'Thợ sửa chữa';
            document.getElementById('welcomeName').textContent = `Xin chào, ${name}!`;

            // Logout
            document.getElementById('logoutBtn')?.addEventListener('click', (e) => {
                e.preventDefault();
                sessionStorage.clear();
                window.location.href = 'login.html';
            });
        });
    </script>
</body>
</html>
